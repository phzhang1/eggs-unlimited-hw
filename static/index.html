<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Eggs Unlimited — Request Eggs</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
</head>
<body class="bg-light">
  <main class="container py-4">
    <h1 class="mb-4">Eggs Unlimited — Request Eggs</h1>

    <!-- block browser popup for custom error messages -->
    <form id="request-form" novalidate>

      <div class="mb-3">
        <label class="form-label" for="farm_name">Farm Name <span class="text-danger">*</span></label>
        <input class="form-control" type="text" id="farm_name" name="farm_name" required />
        <div class="invalid-feedback" data-error-for="farm_name"></div>
      </div>

      <div class="mb-3">
        <label class="form-label" for="contact">Contact Person <span class="text-danger">*</span></label>
        <input class="form-control" type="text" id="contact" name="contact" required />
        <div class="invalid-feedback" data-error-for="contact"></div>
      </div>

      <div class="mb-3">
        <label class="form-label" for="phone_email">Phone / Email</label>
        <input class="form-control" type="text" id="phone_email" name="phone_email" />
        <div class="invalid-feedback" data-error-for="phone_email"></div>
      </div>

      <div class="mb-3">
        <label class="form-label" for="location">Location <span class="text-danger">*</span></label>
        <input class="form-control" type="text" id="location" name="location" placeholder="ZIP code or city" required />
        <div class="invalid-feedback" data-error-for="location"></div>
      </div>

      <div class="mb-3">
        <label class="form-label" for="type">Type <span class="text-danger">*</span></label>
        <select class="form-select" id="type" name="type" required>
          <option value="">— select —</option>
          <option value="Conventional">Conventional</option>
          <option value="CageFree">Cage Free</option>
          <option value="FreeRange">Free Range</option>
          <option value="Organic">Organic</option>
        </select>
        <div class="invalid-feedback" data-error-for="type"></div>
      </div>

      <div class="mb-3">
        <label class="form-label" for="size">Size <span class="text-danger">*</span></label>
        <select class="form-select" id="size" name="size" required>
          <option value="">— select —</option>
          <option value="Medium">Medium</option>
          <option value="Large">Large</option>
          <option value="XLarge">X-Large</option>
          <option value="Jumbo">Jumbo</option>
        </select>
        <div class="invalid-feedback" data-error-for="size"></div>
      </div>

      <div class="mb-3">
        <label class="form-label" for="grade">Grade <span class="text-danger">*</span></label>
        <select class="form-select" id="grade" name="grade" required>
          <option value="">— select —</option>
          <option value="AA">AA</option>
          <option value="A">A</option>
          <option value="B">B</option>
        </select>
        <div class="invalid-feedback" data-error-for="grade"></div>
      </div>

      <div class="mb-3">
        <label class="form-label" for="pack">Pack <span class="text-danger">*</span></label>
        <select class="form-select" id="pack" name="pack" required>
          <option value="">— select —</option>
          <option value="12ct_carton">12-count carton</option>
          <option value="18ct_carton">18-count carton</option>
          <option value="24ct_tray">24-count tray</option>
          <option value="30dozen_case">30-dozen case</option>
        </select>
        <div class="invalid-feedback" data-error-for="pack"></div>
      </div>

      <div class="row mb-3">
        <div class="col">
          <label class="form-label" for="quantity_value">Quantity <span class="text-danger">*</span></label>
          <input class="form-control" type="number" id="quantity_value" name="quantity_value" min="0" step="any" required />
          <div class="invalid-feedback" data-error-for="quantity_value"></div>
        </div>
        <div class="col">
          <label class="form-label" for="quantity_unit">Unit <span class="text-danger">*</span></label>
          <input class="form-control" type="text" id="quantity_unit" name="quantity_unit" placeholder="e.g. dozen, cases" required />
          <div class="invalid-feedback" data-error-for="quantity_unit"></div>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label" for="price_per_dozen">Price per Dozen ($)</label>
        <input class="form-control" type="number" id="price_per_dozen" name="price_per_dozen" min="0" step="0.01" />
        <div class="invalid-feedback" data-error-for="price_per_dozen"></div>
      </div>

      <div class="row mb-3">
        <div class="col">
          <label class="form-label" for="available_start">Available Start</label>
          <input class="form-control" type="date" id="available_start" name="available_start" />
          <div class="invalid-feedback" data-error-for="available_start"></div>
        </div>
        <div class="col">
          <label class="form-label" for="available_end">Available End</label>
          <input class="form-control" type="date" id="available_end" name="available_end" />
          <div class="invalid-feedback" data-error-for="available_end"></div>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label" for="notes">Notes</label>
        <textarea class="form-control" id="notes" name="notes" rows="3"></textarea>
        <div class="invalid-feedback" data-error-for="notes"></div>
      </div>

      <button type="submit" class="btn btn-primary">Submit</button>

    </form>

    <div id="form-status" class="mt-3" role="status" aria-live="polite"></div>

    <h2 class="h4 mt-5">Entries</h2>
    <div class="table-responsive">
      <table class="table table-striped table-sm" id="entries-table">
        <thead>
          <tr>
            <th>Created At</th>
            <th>Farm Name</th>
            <th>Contact</th>
            <th>Phone / Email</th>
            <th>Location</th>
            <th>Type</th>
            <th>Size</th>
            <th>Grade</th>
            <th>Pack</th>
            <th>Qty Value</th>
            <th>Qty Unit</th>
            <th>Price/Doz</th>
            <th>Avail. Start</th>
            <th>Avail. End</th>
            <th>Notes</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </main>

  <script>
    const form = document.getElementById("request-form");
    const tbody = document.querySelector("#entries-table tbody");
    const statusBox = document.getElementById("form-status");

    // Column order must match ENTRY_COLUMNS in the JS and the table headers above.
    const ENTRY_COLUMNS = [
      "created_at", "farm_name", "contact", "phone_email", "location",
      "type", "size", "grade", "pack",
      "quantity_value", "quantity_unit", "price_per_dozen",
      "available_start", "available_end", "notes",
    ];

    async function loadEntries() {
      const res = await fetch("/entries");
      const rows = await res.json();
      tbody.innerHTML = "";
      for (const row of rows) {
        const tr = document.createElement("tr");
        for (const col of ENTRY_COLUMNS) {
          const td = document.createElement("td");
          td.textContent = row[col] ?? "";
          tr.appendChild(td);
        }
        tbody.appendChild(tr);
      }
    }

    function clearErrors() {
      statusBox.textContent = "";
      statusBox.className = "mt-3";
      for (const el of form.querySelectorAll(".is-invalid")) {
        el.classList.remove("is-invalid");
      }
      for (const el of form.querySelectorAll("[data-error-for]")) {
        el.textContent = "";
      }
    }

    function showErrors(errors) {
      for (const { field, message } of errors) {
        const input = form.querySelector(`[name="${field}"]`);
        const slot = form.querySelector(`[data-error-for="${field}"]`);
        if (input) input.classList.add("is-invalid");
        if (slot) slot.textContent = message;
      }
      statusBox.textContent = "Please fix the errors above.";
      statusBox.className = "mt-3 alert alert-danger";
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      clearErrors();

      const data = Object.fromEntries(new FormData(form).entries());

      // FormData always returns strings so convert to numbers for Pydantic
      for (const k of ["quantity_value", "price_per_dozen"]) {
        if (data[k] === "") delete data[k];
        else if (data[k] != null) data[k] = Number(data[k]);
      }

      // before fetch, strip empty-string optionals so Pydantic treats them as missing, not as "".
      for (const k of ["phone_email", "available_start", "available_end", "notes"]) {
        if (data[k] === "") delete data[k];
      }

      const res = await fetch("/submit", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data),
      });

      if (res.status === 201) {
        const { id } = await res.json();
        statusBox.textContent = `Saved entry ${id}.`;
        statusBox.className = "mt-3 alert alert-success";
        form.reset();
        loadEntries();
      } else if (res.status === 422) {
        const { errors } = await res.json();
        showErrors(errors);
      } else {
        statusBox.textContent = `Unexpected server error (${res.status}).`;
        statusBox.className = "mt-3 alert alert-danger";
      }
    });

    loadEntries();
  </script>
</body>
</html>
